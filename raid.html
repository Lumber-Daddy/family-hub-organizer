<!DOCTYPE html>
<html lang="en" class="h-full bg-black">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Arena - Family Quest Hub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'rpg-blue-light': '#1e3a8a', // Blue 900
                        'rpg-blue-dark': '#0f172a', // Slate 900
                        'rpg-border': '#cbd5e1', // Slate 300
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        fantasy: ['Cinzel', 'serif'],
                        retro: ['"Courier New"', 'Courier', 'monospace'],
                    },
                    keyframes: {
                        hopAndWiggle: {
                            '0%, 100%': { transform: 'translateY(0) rotate(0)' },
                            '20%': { transform: 'translateY(-10px) rotate(-8deg)' },
                            '40%': { transform: 'translateY(0) rotate(8deg)' },
                            '60%': { transform: 'translateY(-5px) rotate(-4deg)' },
                            '80%': { transform: 'translateY(0) rotate(4deg)' },
                        },
                        damageShake: {
                            '0%, 100%': { transform: 'translateX(0) scale(1)', filter: 'brightness(1) contrast(1)' },
                            '10%': { filter: 'brightness(2) contrast(2) drop-shadow(0 0 20px red)' },
                            '20%, 60%': { transform: 'translateX(-15px) scale(0.95)' },
                            '40%, 80%': { transform: 'translateX(15px) scale(0.95)' },
                        },
                        magicFlash: {
                            '0%, 100%': { filter: 'brightness(1) invert(0) hue-rotate(0deg)' },
                            '25%': { filter: 'brightness(2) invert(0.8) hue-rotate(90deg)' },
                            '50%': { filter: 'brightness(2) invert(0) hue-rotate(180deg)' },
                            '75%': { filter: 'brightness(2) invert(0.8) hue-rotate(270deg)' },
                        },
                        lungeLeft: {
                            '0%, 100%': { transform: 'translateX(0)' },
                            '40%': { transform: 'translateX(-40px) scale(1.1)' },
                            '60%': { transform: 'translateX(-40px) scale(1.1)' },
                        },
                        floatUp: {
                            '0%': { transform: 'translateY(0) scale(0.5)', opacity: '0' },
                            '20%': { transform: 'translateY(-20px) scale(1.2)', opacity: '1' },
                            '80%': { transform: 'translateY(-60px) scale(1)', opacity: '1' },
                            '100%': { transform: 'translateY(-80px) scale(1)', opacity: '0' },
                        },
                        popIn: {
                            '0%': { transform: 'scale(0.5)', opacity: '0' },
                            '80%': { transform: 'scale(1.1)', opacity: '1' },
                            '100%': { transform: 'scale(1)', opacity: '1' },
                        }
                    },
                    animation: {
                        'hop-and-wiggle': 'hopAndWiggle 2s ease-in-out infinite',
                        'damage-shake': 'damageShake 0.5s ease-in-out',
                        'magic-flash': 'magicFlash 0.6s ease-in-out',
                        'lunge-left': 'lungeLeft 0.5s ease-in-out',
                        'float-up': 'floatUp 1.2s ease-out forwards',
                        'pop-in': 'popIn 0.3s ease-out forwards',
                    }
                }
            }
        }
    </script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&display=swap" rel="stylesheet">

    <style>
        .rpg-box {
            background: linear-gradient(to bottom right, #1e3a8a, #0f172a);
            border: 4px solid #cbd5e1;
            border-radius: 8px;
            box-shadow: inset 0 0 0 3px #000, 0 0 0 4px #000, 0 10px 15px rgba(0,0,0,0.5);
            color: #f8fafc;
            text-shadow: 2px 2px 0 #000;
        }
        
        .rpg-btn {
            cursor: pointer;
            transition: all 0.1s;
            position: relative;
            padding-left: 1.5rem;
        }
        
        .rpg-btn:hover {
            color: #fde047; /* yellow-300 */
        }
        
        .rpg-btn:hover::before {
            content: '▶';
            position: absolute;
            left: 0;
            color: #fde047;
            animation: blink 0.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Custom scrollbar for RPG menus */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.5); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; border: 1px solid #000; }
        
        .battle-bg {
            background-color: #2c1a16;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 100, 100, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(100, 100, 255, 0.1) 0%, transparent 40%),
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.2) 2px, rgba(0,0,0,0.2) 4px);
        }
    </style>
</head>
<body class="h-full flex flex-col overflow-hidden text-gray-100 bg-black font-retro select-none">

    <div id="loading-overlay" class="fixed inset-0 bg-black z-50 flex flex-col items-center justify-center transition-opacity duration-500">
        <i data-lucide="swords" class="w-16 h-16 text-white animate-pulse mb-4"></i>
        <p class="text-xl font-bold tracking-widest">LOADING ARENA...</p>
    </div>

    <nav class="bg-gray-900 border-b-4 border-gray-700 flex items-center justify-between px-6 h-14 flex-shrink-0 z-20 shadow-lg">
        <div class="flex items-center gap-3">
            <span class="text-xl font-bold font-fantasy text-amber-400 tracking-wider">THE ARENA</span>
        </div>
        <a href="index.html" class="text-gray-400 hover:text-white font-bold flex items-center gap-2 transition-colors border border-gray-600 px-3 py-1 rounded bg-gray-800 hover:bg-gray-700">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> RETURN TO HUB
        </a>
    </nav>

    <main class="flex-1 flex flex-col p-2 md:p-4 gap-2 max-w-6xl mx-auto w-full relative">
        
        <div class="flex-1 battle-bg border-4 border-gray-600 rounded-lg shadow-inner relative flex overflow-hidden">
            <div class="absolute bottom-0 left-0 right-0 h-1/4 bg-gradient-to-t from-black/60 to-transparent pointer-events-none"></div>

            <div class="w-1/2 flex flex-col items-center justify-center relative z-10 p-4">
                <div id="boss-sprite-container" class="relative transition-all text-center">
                    </div>
            </div>

            <div id="party-sprites-container" class="w-1/2 flex flex-col justify-center items-end pr-8 md:pr-16 gap-6 relative z-10">
                </div>
            
            <div id="victory-overlay" class="absolute inset-0 bg-black/60 hidden items-center justify-center z-30 backdrop-blur-sm">
                <div class="text-center animate-pop-in">
                    <h2 class="text-6xl font-black font-fantasy text-amber-400 drop-shadow-[0_5px_5px_rgba(0,0,0,1)] tracking-widest mb-4">VICTORY!</h2>
                    <p class="text-xl font-bold text-white drop-shadow-md">The monster has been vanquished!</p>
                </div>
            </div>
        </div>

        <div class="h-64 flex gap-2 flex-shrink-0">
            
            <div class="w-1/3 rpg-box flex flex-col p-3 overflow-hidden">
                <div class="border-b-2 border-slate-400/50 pb-2 mb-2">
                    <h3 id="ui-boss-name" class="font-bold text-amber-300 truncate tracking-wide">RAID BOSS</h3>
                    <div class="flex items-center gap-2 mt-1">
                        <span class="text-xs">HP</span>
                        <div class="flex-grow bg-black h-3 border border-gray-500 rounded-sm">
                            <div id="ui-boss-hp-bar" class="bg-red-600 h-full w-full transition-all duration-300"></div>
                        </div>
                    </div>
                </div>
                <div id="battle-log" class="flex-grow overflow-y-auto text-sm md:text-base leading-relaxed space-y-1 flex flex-col justify-end">
                    <p class="text-gray-400 italic text-xs">Waiting for battle...</p>
                </div>
            </div>

            <div class="w-2/3 rpg-box flex flex-col p-4 overflow-hidden relative">
                <div id="menu-header" class="text-amber-300 font-bold mb-3 tracking-widest border-b-2 border-slate-400/50 pb-2 flex justify-between items-center">
                    <span>COMMANDS</span>
                    <span id="menu-subtitle" class="text-xs text-gray-300">Select Objective</span>
                </div>
                
                <div id="menu-tasks" class="flex-grow overflow-y-auto space-y-2 pr-2">
                    </div>

                <div id="menu-heroes" class="hidden flex-grow overflow-y-auto grid grid-cols-2 gap-2 pr-2 items-start content-start">
                    </div>
                
                <button id="menu-back-btn" class="hidden absolute bottom-4 right-4 text-gray-400 hover:text-white transition-colors flex items-center gap-1 text-sm bg-black/50 px-2 py-1 rounded border border-gray-600">
                    <i data-lucide="corner-down-left" class="w-4 h-4"></i> BACK
                </button>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { 
            getFirestore, doc, onSnapshot, collection, writeBatch, serverTimestamp, setLogLevel 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // === State ===
        let db, auth, userId;
        const appId = 'family-hub-organizer';
        
        let sounds = {};
        let confettiEffect;
        let isAnimating = false; // Locks UI during attacks
        let battleLogMsgs = [];
        
        let localState = {
            members: [],
            raid: null
        };
        let hasLoaded = { members: false, raid: false };
        
        // Menu navigation state
        let selectedTaskIdx = null;

        // === Audio & Effects Setup ===
        function initSounds() {
            if (typeof Tone === 'undefined') return;
            Tone.start();

            sounds.hit = new Tone.MembraneSynth({ pitchDecay: 0.05, octaves: 4, envelope: { attack: 0.001, decay: 0.2, sustain: 0, release: 0.1 }, volume: -8 }).toDestination();
            sounds.bossHit = new Tone.MembraneSynth({ pitchDecay: 0.2, octaves: 1, envelope: { attack: 0.01, decay: 0.4, sustain: 0, release: 0.2 }, volume: -2 }).toDestination();
            sounds.magic = new Tone.FMSynth({ harmonicity: 3, modulationIndex: 10, oscillator: { type: "sine" }, envelope: { attack: 0.05, decay: 0.2, sustain: 0.1, release: 0.5 }, volume: -15 }).toDestination();
            sounds.heal = new Tone.PolySynth(Tone.Synth, { oscillator: { type: "triangle" }, envelope: { attack: 0.1, decay: 0.2, sustain: 0.2, release: 0.5 }, volume: -15 }).toDestination();
            sounds.click = new Tone.MembraneSynth({ pitchDecay: 0.005, octaves: 1, envelope: { attack: 0.001, decay: 0.05, sustain: 0, release: 0.01 }, volume: -20 }).toDestination();
            sounds.error = new Tone.Synth({ oscillator: { type: "square" }, envelope: { attack: 0.01, decay: 0.1, sustain: 0, release: 0.1 }, volume: -15 }).toDestination();

            document.body.removeEventListener('click', initSounds);
        }

        function playSound(type) {
            if (Tone.context.state !== 'running') return;
            const now = Tone.now();
            try {
                if (type === 'click') sounds.click.triggerAttackRelease("C2", "16n", now);
                if (type === 'error') sounds.error.triggerAttackRelease("A2", "16n", now);
                if (type === 'strike') sounds.hit.triggerAttackRelease("C1", "8n", now);
                if (type === 'bossHit') {
                    sounds.bossHit.triggerAttackRelease("C0", "4n", now);
                    sounds.hit.triggerAttackRelease("E1", "8n", now + 0.1);
                }
                if (type === 'spell') sounds.magic.triggerAttackRelease("C5", "8n", now);
                if (type === 'heal') sounds.heal.triggerAttackRelease(["C4", "E4", "G4"], "4n", now);
            } catch(e) { console.error("Audio error:", e); }
        }

        function initConfetti() {
            const canvas = document.createElement('canvas');
            canvas.style.position = 'fixed';
            canvas.style.top = '0';
            canvas.style.left = '0';
            canvas.style.width = '100%';
            canvas.style.height = '100%';
            canvas.style.pointerEvents = 'none';
            canvas.style.zIndex = '100';
            document.body.appendChild(canvas);
            confettiEffect = confetti.create(canvas, { resize: true });
        }

        function triggerVictoryConfetti() {
             if (!confettiEffect) return;
             const duration = 5000;
             const animationEnd = Date.now() + duration;
             const defaults = { startVelocity: 45, spread: 360, ticks: 100, zIndex: 100, particleCount: 100, colors: ['#fbbf24', '#f59e0b', '#b45309', '#ffffff'] };
             
             const interval = setInterval(function() {
                 const timeLeft = animationEnd - Date.now();
                 if (timeLeft <= 0) { return clearInterval(interval); }
                 const particleCount = defaults.particleCount * (timeLeft / duration);
                 confettiEffect({ ...defaults, particleCount, origin: { x: Math.random(), y: Math.random() - 0.2 } });
             }, 250);
        }

        function spawnFloatingText(text, x, y, type) {
            const el = document.createElement('div');
            let colorClass = 'text-white';
            if (type === 'damage') colorClass = 'text-red-400 drop-shadow-[0_2px_2px_#000]';
            if (type === 'heal') colorClass = 'text-emerald-400 drop-shadow-[0_2px_2px_#000]';
            
            el.className = `absolute font-black font-retro text-3xl md:text-5xl ${colorClass} z-50 pointer-events-none animate-float-up text-center w-64 -ml-32`;
            el.style.left = `${x}px`;
            el.style.top = `${y}px`;
            el.innerText = text;
            
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1500);
        }

        function addLog(msg, color = 'text-gray-100') {
            battleLogMsgs.push({ text: msg, color: color });
            if (battleLogMsgs.length > 20) battleLogMsgs.shift();
            
            const logEl = document.getElementById('battle-log');
            if (logEl) {
                logEl.innerHTML = battleLogMsgs.map(m => `<p class="${m.color}">${m.text}</p>`).join('');
                logEl.scrollTop = logEl.scrollHeight;
            }
        }

        // === Firebase Init & Loading ===
        async function initFirebase() {
            try {
                const firebaseConfig = {
                    apiKey: "AIzaSyD_piA_kA7WZFN7GgxCDPpNNxyjrVRTj3M",
                    authDomain: "family-hub-organizer.firebaseapp.com",
                    projectId: "family-hub-organizer",
                    storageBucket: "family-hub-organizer.firebasestorage.app",
                    messagingSenderId: "468888595189",
                    appId: "1:468888595189:web:eb6f33ee8e62cdc489b3bc"
                };

                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
                setLogLevel('error');

                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        userId = user.uid;
                        await loadData();
                    } else {
                        await signInAnonymously(auth);
                    }
                });
            } catch (error) {
                document.getElementById('loading-text').textContent = 'Connection Error';
                document.getElementById('loading-overlay').classList.remove('bg-black');
                document.getElementById('loading-overlay').classList.add('bg-red-900');
            }
        }

        async function loadData() {
            if (!db || !userId) return;

            const F_MEMBERS_COL = `/artifacts/${appId}/public/data/members`;
            const F_RAID_DOC = `/artifacts/${appId}/public/data/raids/current`;

            onSnapshot(collection(db, F_MEMBERS_COL), (snapshot) => {
                localState.members = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                hasLoaded.members = true;
                checkInitComplete();
            });
            
            onSnapshot(doc(db, F_RAID_DOC), (docSnap) => {
                if(docSnap.exists()) {
                    localState.raid = { id: docSnap.id, ...docSnap.data() };
                } else {
                    localState.raid = null;
                }
                hasLoaded.raid = true;
                checkInitComplete();
            });
        }

        function checkInitComplete() {
            if (hasLoaded.members && hasLoaded.raid) {
                document.getElementById('loading-overlay').classList.add('opacity-0', 'pointer-events-none');
                
                // Only full render if not mid-animation to prevent UI glitches
                if (!isAnimating) {
                    renderArena();
                }
            }
        }

        // === RENDERING LOGIC ===
        function renderArena() {
            const raid = localState.raid;
            const bossContainer = document.getElementById('boss-sprite-container');
            const partyContainer = document.getElementById('party-sprites-container');
            const tasksMenu = document.getElementById('menu-tasks');
            const heroesMenu = document.getElementById('menu-heroes');
            const uiBossName = document.getElementById('ui-boss-name');
            const uiBossHpBar = document.getElementById('ui-boss-hp-bar');
            const headerText = document.getElementById('menu-header').firstElementChild;
            const subtitleText = document.getElementById('menu-subtitle');
            const backBtn = document.getElementById('menu-back-btn');
            const overlay = document.getElementById('victory-overlay');

            if (!raid || !raid.isActive) {
                uiBossName.textContent = "NO TARGET";
                uiBossHpBar.style.width = "0%";
                bossContainer.innerHTML = '';
                tasksMenu.innerHTML = `<p class="text-gray-400 italic text-center mt-8 text-sm">No raid boss detected in the realm.<br>Return to the Hub to summon one.</p>`;
                partyContainer.innerHTML = '';
                overlay.classList.replace('flex', 'hidden');
                lucide.createIcons();
                return;
            }

            // Update Boss UI
            const isDefeated = raid.hp <= 0;
            const bossPct = Math.max(0, (raid.hp / raid.maxHp) * 100);
            uiBossName.textContent = raid.name.toUpperCase();
            uiBossHpBar.style.width = `${bossPct}%`;

            let prizeDisplay = '';
            if (raid.prize?.type === 'custom') {
                prizeDisplay = `Defeat Prize: ${raid.prize.value} 🏆`;
            } else {
                prizeDisplay = `Defeat Prize: ${raid.prize?.value || raid.prize || 0} 💎`;
            }

            bossContainer.innerHTML = `
                <div id="boss-sprite" class="text-[150px] md:text-[200px] leading-none filter drop-shadow-[0_20px_20px_rgba(0,0,0,0.8)] transition-all duration-700 ${isDefeated ? 'opacity-30 grayscale scale-y-50 translate-y-20 blur-sm' : 'animate-hop-and-wiggle'}">
                    ${raid.emoji}
                </div>
                <p class="text-amber-300 font-bold text-sm mt-1 z-10 relative drop-shadow-md text-center">${prizeDisplay}</p>
            `;

            if (isDefeated) {
                overlay.classList.replace('hidden', 'flex');
                if (!confettiEffect) initConfetti(); // Ensure ready
            } else {
                overlay.classList.replace('flex', 'hidden');
            }

            // Render Party Sprites
            const sortedMembers = [...localState.members].sort((a, b) => (a.displayOrder || 0) - (b.displayOrder || 0));
            partyContainer.innerHTML = sortedMembers.map(m => `
                <div id="hero-sprite-${m.id}" class="flex items-center gap-3 transition-transform duration-300">
                    <div class="bg-black/50 px-2 py-1 rounded border border-gray-600 shadow-md">
                        <span class="font-bold text-sm tracking-wide text-white drop-shadow">${m.name}</span>
                    </div>
                    <div class="w-14 h-14 md:w-16 md:h-16 rounded-full ${m.color} flex items-center justify-center text-3xl font-bold shadow-[0_5px_15px_rgba(0,0,0,0.6)] border-2 border-white/30 z-10 relative">
                        ${m.emoji || m.name[0]}
                    </div>
                </div>
            `).join('');

            // Render Menus
            if (selectedTaskIdx !== null && raid.tasks[selectedTaskIdx]) {
                // Show Hero Selection
                tasksMenu.classList.add('hidden');
                heroesMenu.classList.remove('hidden');
                backBtn.classList.remove('hidden');
                
                headerText.textContent = "SELECT HERO";
                subtitleText.textContent = `For: ${raid.tasks[selectedTaskIdx].name}`;

                heroesMenu.innerHTML = sortedMembers.map(m => `
                    <div class="rpg-btn bg-black/40 border border-gray-600 rounded p-2 flex items-center gap-2 hover:bg-gray-800" onclick="executeTask('${m.id}')">
                        <div class="w-6 h-6 rounded-full ${m.color} flex items-center justify-center text-xs shadow-sm">${m.emoji || m.name[0]}</div>
                        <span class="truncate text-sm font-bold">${m.name}</span>
                    </div>
                `).join('');
            } else {
                // Show Task List
                tasksMenu.classList.remove('hidden');
                heroesMenu.classList.add('hidden');
                backBtn.classList.add('hidden');

                headerText.textContent = "COMMANDS";
                subtitleText.textContent = "Select Objective";

                if (raid.tasks && raid.tasks.length > 0) {
                    const incompleteTasks = raid.tasks.map((t, idx) => ({...t, idx})).filter(t => !t.isComplete);
                    
                    if (isDefeated) {
                        tasksMenu.innerHTML = `<p class="text-amber-400 text-center mt-8 blink">BATTLE CONCLUDED</p>`;
                    } else if (incompleteTasks.length === 0) {
                        tasksMenu.innerHTML = `<p class="text-gray-400 text-center mt-8 text-sm">All objectives complete. Wait for Boss to fall or add more in Hub.</p>`;
                    } else {
                        tasksMenu.innerHTML = incompleteTasks.map(t => {
                            let typeText = t.type === 'strike' ? 'ATK' : (t.type === 'spell' ? 'MAG' : 'HEAL');
                            let color = t.type === 'strike' ? 'text-red-400' : (t.type === 'spell' ? 'text-blue-400' : 'text-emerald-400');
                            
                            return `
                            <div class="rpg-btn flex justify-between items-center py-1.5 border-b border-gray-700/50 text-sm md:text-base" onclick="selectTask(${t.idx})">
                                <span class="truncate pr-2">${t.name}</span>
                                <span class="text-xs md:text-sm ${color} flex-shrink-0 w-16 text-right">${typeText} ${t.damage}</span>
                            </div>
                        `}).join('');
                    }
                } else {
                    tasksMenu.innerHTML = `<p class="text-gray-500 italic mt-4 text-sm">No objectives found.</p>`;
                }
            }
            
            lucide.createIcons();
            
            // First load initialization
            if (battleLogMsgs.length === 0 && raid && !isDefeated) {
                addLog(`Enemy ${raid.name} appeared!`, 'text-red-400 font-bold');
            }
        }

        // Make functions globally available for inline onclick attributes
        window.selectTask = function(idx) {
            if(isAnimating) return;
            playSound('click');
            selectedTaskIdx = idx;
            renderArena();
        };

        window.executeTask = async function(heroId) {
            if (isAnimating || selectedTaskIdx === null) return;
            
            const raid = localState.raid;
            const task = raid.tasks[selectedTaskIdx];
            const hero = localState.members.find(m => m.id === heroId);
            
            if (!raid || !task || !hero || raid.hp <= 0) return;

            // Lock UI & State
            isAnimating = true;
            const taskIdxToRun = selectedTaskIdx;
            selectedTaskIdx = null; // Clear selection for after animation
            renderArena(); // Re-renders to show base command menu (temporarily unclickable due to isAnimating)
            
            // Log preparation
            addLog(`${hero.name} readies ${task.name}!`, 'text-amber-200');

            // 1. Hero Lunge Animation
            const heroSprite = document.getElementById(`hero-sprite-${hero.id}`);
            if (heroSprite) {
                heroSprite.classList.add('animate-lunge-left');
                setTimeout(() => heroSprite.classList.remove('animate-lunge-left'), 600);
            }

            await new Promise(r => setTimeout(r, 200)); // Wait for lunge apex

            // 2. Action Effects
            const bossSprite = document.getElementById('boss-sprite');
            const bossRect = bossSprite ? bossSprite.getBoundingClientRect() : {left: 200, top: 200, width: 100, height: 100};
            const cx = bossRect.left + bossRect.width/2;
            const cy = bossRect.top + bossRect.height/2;

            if (task.type === 'strike') {
                playSound('strike');
                spawnFloatingText(`${task.damage}`, cx, cy, 'damage');
                if (bossSprite) {
                    bossSprite.classList.remove('animate-hop-and-wiggle');
                    bossSprite.classList.add('animate-damage-shake');
                    setTimeout(() => {
                        bossSprite.classList.remove('animate-damage-shake');
                        bossSprite.classList.add('animate-hop-and-wiggle');
                    }, 500);
                }
                playSound('bossHit');
            } 
            else if (task.type === 'spell') {
                playSound('spell');
                if (bossSprite) {
                    bossSprite.classList.remove('animate-hop-and-wiggle');
                    bossSprite.classList.add('animate-magic-flash');
                    setTimeout(() => {
                        bossSprite.classList.remove('animate-magic-flash');
                        bossSprite.classList.add('animate-damage-shake');
                        spawnFloatingText(`${task.damage}`, cx, cy, 'damage');
                        playSound('bossHit');
                        setTimeout(() => {
                            bossSprite.classList.remove('animate-damage-shake');
                            bossSprite.classList.add('animate-hop-and-wiggle');
                        }, 500);
                    }, 500); // Delay damage until flash finishes
                } else {
                     spawnFloatingText(`${task.damage}`, cx, cy, 'damage');
                }
            } 
            else if (task.type === 'heal') {
                playSound('heal');
                // Spawn text on the hero side
                const heroRect = heroSprite.getBoundingClientRect();
                spawnFloatingText(`+${task.damage} LOOT`, heroRect.left, heroRect.top, 'heal');
            }

            // 3. Wait for visual impacts to conclude
            const waitTime = task.type === 'spell' ? 1200 : 800;
            await new Promise(r => setTimeout(r, waitTime));

            // 4. Calculate Logic & Firebase Commit
            const damage = task.type === 'heal' ? 0 : task.damage;
            const newHp = Math.max(0, raid.hp - damage);
            const lootEarned = task.damage; 
            
            const updatedTasks = [...raid.tasks];
            updatedTasks[taskIdxToRun] = {
                ...task,
                isComplete: true,
                completedBy: hero.id
            };

            try {
                const batch = writeBatch(db);
                
                // Update Boss Document
                batch.update(doc(db, `/artifacts/${appId}/public/data/raids/current`), {
                    hp: newHp, tasks: updatedTasks
                });

                if (newHp === 0 && raid.hp > 0) {
                    // BOSS DEFEATED
                    const prize = raid.prize || { type: 'loot', value: 0 };
                    const pType = prize.type || 'loot';
                    const pVal = prize.type ? prize.value : prize; // Handle legacy numbers

                    if (pType === 'loot') {
                        // Distribute loot to all members
                        localState.members.forEach(m => {
                            let totalLoot = parseInt(pVal, 10) || 0;
                            if (m.id === hero.id) totalLoot += lootEarned; 
                            
                            batch.update(doc(db, `/artifacts/${appId}/public/data/members/${m.id}`), {
                                points: (m.points || 0) + totalLoot
                            });

                            batch.set(doc(collection(db, `/artifacts/${appId}/public/data/choreHistory`)), {
                                type: 'chore_complete',
                                choreName: `[RAID DEFEATED] ${raid.name} Bounty`,
                                choreEmoji: '🏆', 
                                memberId: m.id, 
                                memberName: m.name, 
                                pointsEarned: parseInt(pVal, 10) || 0,
                                timestamp: serverTimestamp()
                            });
                        });
                    } else {
                        // Custom reward -> Create a generic claim for the party
                        batch.set(doc(collection(db, `/artifacts/${appId}/public/data/claimedRewards`)), {
                            rewardId: `raid-prize-${Date.now()}`,
                            name: `[Raid Victory] ${pVal}`,
                            emoji: '🏆',
                            cost: 0,
                            claimedBy: hero.id,
                            claimedAt: serverTimestamp(),
                            delivered: false
                        });

                        // Standard task update for the hero
                        batch.update(doc(db, `/artifacts/${appId}/public/data/members/${hero.id}`), {
                            points: (hero.points || 0) + lootEarned
                        });
                        batch.set(doc(collection(db, `/artifacts/${appId}/public/data/choreHistory`)), {
                            type: 'chore_complete',
                            choreName: `[RAID DEFEATED] Secured Prize: ${pVal}`,
                            choreEmoji: '🏆', 
                            memberId: hero.id, 
                            memberName: hero.name, 
                            pointsEarned: 0,
                            timestamp: serverTimestamp()
                        });
                    }

                    // Log the hero's specific final action
                    let actionText = task.type === 'strike' ? 'struck' : (task.type === 'spell' ? 'cast a spell on' : 'supported the raid against');
                    batch.set(doc(collection(db, `/artifacts/${appId}/public/data/choreHistory`)), {
                        type: 'chore_complete',
                        choreName: `[RAID] ${task.name} - ${actionText} boss`,
                        choreEmoji: raid.emoji, 
                        memberId: hero.id, 
                        memberName: hero.name, 
                        pointsEarned: lootEarned,
                        timestamp: serverTimestamp()
                    });

                } else {
                    // Update Acting Hero Normally
                    batch.update(doc(db, `/artifacts/${appId}/public/data/members/${hero.id}`), {
                        points: (hero.points || 0) + lootEarned
                    });

                    let actionText = task.type === 'strike' ? 'struck' : (task.type === 'spell' ? 'cast a spell on' : 'supported the raid against');
                    batch.set(doc(collection(db, `/artifacts/${appId}/public/data/choreHistory`)), {
                        type: 'chore_complete',
                        choreName: `[RAID] ${task.name} - ${actionText} boss`,
                        choreEmoji: raid.emoji, 
                        memberId: hero.id, 
                        memberName: hero.name, 
                        pointsEarned: lootEarned,
                        timestamp: serverTimestamp()
                    });
                }

                await batch.commit();
                
                addLog(`${task.name} complete! Earned ${lootEarned} Loot.`, 'text-emerald-300');

                if (newHp === 0 && raid.hp > 0) {
                    const prizeDesc = (raid.prize?.type === 'custom') ? raid.prize.value : `${raid.prize?.value || raid.prize || 0} Loot`;
                    addLog(`${raid.name} was defeated! The party secures ${prizeDesc}!`, 'text-yellow-400 font-bold');
                    
                    setTimeout(() => {
                        playSound('heal'); // Stand in for victory fanfare
                        triggerVictoryConfetti();
                    }, 500);
                    
                    // Conclude the raid gracefully after 6 seconds of celebration
                    setTimeout(async () => {
                        try {
                            await updateDoc(doc(db, `/artifacts/${appId}/public/data/raids/current`), { isActive: false });
                        } catch(e){}
                    }, 6000);
                }

            } catch (error) {
                console.error("Task execution failed:", error);
                playSound('error');
                addLog(`Error connecting to network. Action failed.`, 'text-red-500');
            } finally {
                isAnimating = false;
                renderArena();
            }
        };

        document.getElementById('menu-back-btn').addEventListener('click', () => {
            if(isAnimating) return;
            playSound('click');
            selectedTaskIdx = null;
            renderArena();
        });

        // Bootstrap
        document.addEventListener('DOMContentLoaded', () => {
            document.body.addEventListener('click', initSounds, { once: true });
            initConfetti();
            lucide.createIcons();
            initFirebase();
        });

    </script>
</body>
</html>
