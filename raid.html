<!DOCTYPE html>
<html lang="en" class="h-full bg-[#fcf9f2]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Arena - Family Quest Hub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'guild-bg': '#fcf9f2',
                        'guild-panel': '#f5ebd9',
                        'guild-leather': '#451a03',
                        'guild-leather-dark': '#290f02',
                        'guild-gold': '#b45309',
                        'guild-action': '#065f46',
                        'guild-action-hover': '#064e3b',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        fantasy: ['Cinzel', 'serif'],
                    },
                    keyframes: {
                        popIn: {
                            '0%': { transform: 'scale(0.5)', opacity: '0' },
                            '80%': { transform: 'scale(1.1)', opacity: '1' },
                            '100%': { transform: 'scale(1)', opacity: '1' },
                        },
                        hopAndWiggle: {
                            '0%, 100%': { transform: 'translateY(0) rotate(0)' },
                            '20%': { transform: 'translateY(-10px) rotate(-12deg)' },
                            '40%': { transform: 'translateY(0) rotate(12deg)' },
                            '60%': { transform: 'translateY(-5px) rotate(-6deg)' },
                            '80%': { transform: 'translateY(0) rotate(6deg)' },
                        },
                        damageShake: {
                            '0%, 100%': { transform: 'translateX(0) scale(1)' },
                            '20%, 60%': { transform: 'translateX(-10px) scale(0.95)' },
                            '40%, 80%': { transform: 'translateX(10px) scale(0.95)' },
                        },
                        magicFlash: {
                            '0%, 100%': { filter: 'brightness(1) invert(0)' },
                            '50%': { filter: 'brightness(1.5) invert(0.2)' },
                        }
                    },
                    animation: {
                        'pop-in': 'popIn 0.3s ease-out',
                        'hop-and-wiggle': 'hopAndWiggle 0.7s ease-in-out',
                        'damage-shake': 'damageShake 0.4s ease-in-out',
                        'magic-flash': 'magicFlash 0.5s ease-in-out',
                    }
                }
            }
        }
    </script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fcf9f2;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f5ebd9; }
        ::-webkit-scrollbar-thumb { background: #b45309; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #78350f; }
        
        .animate-hop-and-wiggle { animation: hopAndWiggle 0.7s ease-in-out; }
        .animate-damage-shake { animation: damageShake 0.4s ease-in-out; }
        .animate-magic-flash { animation: magicFlash 0.5s ease-in-out; }
    </style>
</head>
<body class="h-full flex flex-col overflow-hidden text-gray-800">

    <div id="loading-overlay" class="fixed inset-0 bg-guild-bg z-50 flex flex-col items-center justify-center transition-opacity duration-300">
        <svg class="animate-spin h-14 w-14 text-guild-leather" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <p id="loading-text" class="mt-4 text-xl font-fantasy font-bold text-guild-leather-dark">Connecting to The Arena...</p>
    </div>

    <!-- Simplified Top Navigation -->
    <nav class="bg-guild-leather text-amber-50 flex items-center justify-between px-6 h-16 shadow-xl z-20 border-b-2 border-guild-leather-dark flex-shrink-0">
        <div class="flex items-center gap-3">
            <i data-lucide="swords" class="h-6 w-6 text-amber-400"></i>
            <span class="text-xl font-bold font-fantasy text-amber-400 tracking-wider drop-shadow-md">The Arena</span>
        </div>
        <a href="index.html" class="text-amber-200/70 hover:text-amber-50 font-fantasy font-bold flex items-center gap-2 transition-colors">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Return to Hub
        </a>
    </nav>

    <main class="flex-1 overflow-y-auto bg-guild-bg relative flex flex-col p-4 md:p-8">
        <div class="absolute inset-0 opacity-40 pointer-events-none" style="background-image: url('data:image/svg+xml,%3Csvg width=\'20\' height=\'20\' viewBox=\'0 0 20 20\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cg fill=\'%23d4b88c\' fill-opacity=\'0.2\' fill-rule=\'evenodd\'%3E%3Ccircle cx=\'3\' cy=\'3\' r=\'3\'/%3E%3Ccircle cx=\'13\' cy=\'13\' r=\'3\'/%3E%3C/g%3E%3C/svg%3E');"></div>
        
        <div id="view-arena" class="relative z-10 max-w-5xl mx-auto w-full flex-grow flex flex-col">
            <!-- Arena content populated by JS -->
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { 
            getFirestore, doc, onSnapshot, collection, query, writeBatch, serverTimestamp, setLogLevel 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let db, auth, userId, appId;
        let sounds = {};
        let confettiEffect;
        let localState = {
            members: [],
            raid: null
        };
        let hasLoaded = {
            members: false,
            raid: false
        };

        // === Sound Initialization ===
        function initSounds(event) {
            if (typeof Tone === 'undefined') return;
            Tone.start();

            const polySynthConfig = {
                 polyphony: 4, volume: -12, detune: 0,
                 oscillator: { type: "triangle" },
                 envelope: { attack: 0.02, decay: 0.3, sustain: 0.2, release: 0.5 } 
             };
            sounds.polySynth = new Tone.PolySynth(polySynthConfig).toDestination();
            sounds.arpUp = { notes: ["C4", "E4", "G4", "C5"], duration: "16n" };
            sounds.sparkle = new Tone.Synth({ oscillator: { type: "sine" }, envelope: { attack: 0.001, decay: 0.05, sustain: 0, release: 0.1 }, volume: -15 }).toDestination(); 
            sounds.uncomplete = new Tone.Synth({ oscillator: { type: "sine" }, envelope: { attack: 0.01, decay: 0.1, sustain: 0.1, release: 0.1 }, volume: -15 }).toDestination();
            sounds.click = new Tone.MembraneSynth({ pitchDecay: 0.005, octaves: 1, envelope: { attack: 0.001, decay: 0.1, sustain: 0.005, release: 0.01 }, volume: -20 }).toDestination();
            sounds.hit = new Tone.MembraneSynth({ pitchDecay: 0.05, octaves: 4, envelope: { attack: 0.001, decay: 0.2, sustain: 0.01, release: 0.01 }, volume: -10 }).toDestination();
            sounds.bossHit = new Tone.MembraneSynth({ pitchDecay: 0.1, octaves: 1, envelope: { attack: 0.01, decay: 0.4, sustain: 0.01, release: 0.01 }, volume: -5 }).toDestination();

            document.body.removeEventListener('click', initSounds);
        }

        function playSound(soundToPlay) {
            const now = Tone.now();
            const polySynth = sounds.polySynth; 

            if (Tone.context.state === 'running') {
                try {
                    if (soundToPlay === 'uncomplete') {
                        sounds.uncomplete.triggerAttackRelease('A3', '8n', now); 
                    } else if (soundToPlay === 'redeem') {
                         if (sounds.arpUp.notes && polySynth) { 
                             let time = now;
                             sounds.arpUp.notes.forEach(note => {
                                 polySynth.triggerAttackRelease(note, "16n", time);
                                 time += Tone.Time("16n").toSeconds();
                             });
                         }
                        sounds.sparkle.triggerAttackRelease('C7', '32n', now + 0.05);
                        sounds.sparkle.triggerAttackRelease('E7', '32n', now + 0.15);
                        sounds.sparkle.triggerAttackRelease('G7', '32n', now + 0.25);
                    } else if (soundToPlay === 'click') {
                        sounds.click.triggerAttackRelease("C1", "16n", now); 
                    } else if (soundToPlay === 'hit') {
                        sounds.hit.triggerAttackRelease("C2", "8n", now);
                    } else if (soundToPlay === 'bossHit') {
                        sounds.bossHit.triggerAttackRelease("C1", "4n", now);
                    } else if (soundToPlay === 'spell') {
                        sounds.sparkle.triggerAttackRelease('E6', '8n', now);
                        sounds.sparkle.triggerAttackRelease('A6', '8n', now + 0.1);
                        sounds.hit.triggerAttackRelease("C2", "16n", now + 0.2); 
                    } else if (soundToPlay === 'heal') {
                        sounds.sparkle.triggerAttackRelease('C5', '16n', now);
                        sounds.sparkle.triggerAttackRelease('E5', '16n', now + 0.1);
                        sounds.sparkle.triggerAttackRelease('G5', '8n', now + 0.2);
                    }
                } catch (e) { console.error(`Error playing sound ${soundToPlay}:`, e); }
            }
        }
        
        function initConfetti() {
            const canvas = document.createElement('canvas');
            canvas.style.position = 'fixed';
            canvas.style.top = '0';
            canvas.style.left = '0';
            canvas.style.width = '100%';
            canvas.style.height = '100%';
            canvas.style.pointerEvents = 'none';
            canvas.style.zIndex = '100';
            document.body.appendChild(canvas);
            confettiEffect = confetti.create(canvas, { resize: true });
        }

        function triggerConfetti() {
             if (!confettiEffect) return;
             const duration = 3000;
             const animationEnd = Date.now() + duration;
             const defaults = { startVelocity: 45, spread: 360, ticks: 100, zIndex: 100, particleCount: 80, colors: ['#b45309', '#065f46', '#991b1b', '#fef3c7'] };
             function randomInRange(min, max) { return Math.random() * (max - min) + min; }
             const interval = setInterval(function() {
                 const timeLeft = animationEnd - Date.now();
                 if (timeLeft <= 0) { return clearInterval(interval); }
                 const particleCount = defaults.particleCount * (timeLeft / duration);
                 confettiEffect({ ...defaults, particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } });
                 confettiEffect({ ...defaults, particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } });
             }, 250);
         }

        // === Firebase Initialization ===
        async function initFirebase() {
            try {
                appId = 'family-hub-organizer';
                const firebaseConfig = {
                    apiKey: "AIzaSyD_piA_kA7WZFN7GgxCDPpNNxyjrVRTj3M",
                    authDomain: "family-hub-organizer.firebaseapp.com",
                    projectId: "family-hub-organizer",
                    storageBucket: "family-hub-organizer.firebasestorage.app",
                    messagingSenderId: "468888595189",
                    appId: "1:468888595189:web:eb6f33ee8e62cdc489b3bc"
                };

                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
                
                setLogLevel('Debug');

                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        userId = user.uid;
                        await loadData();
                        document.getElementById('loading-overlay').classList.add('opacity-0');
                        setTimeout(() => document.getElementById('loading-overlay').classList.add('hidden'), 300);
                    } else {
                        await signInAnonymously(auth);
                    }
                });
            } catch (error) {
                console.error("Firebase init error:", error);
            }
        }

        async function loadData() {
            if (!db || !userId) return;

            const F_MEMBERS_COL = `/artifacts/${appId}/public/data/members`;
            const F_RAID_DOC = `/artifacts/${appId}/public/data/raids/current`;

            onSnapshot(collection(db, F_MEMBERS_COL), (snapshot) => {
                localState.members = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                hasLoaded.members = true;
                if (hasLoaded.members && hasLoaded.raid) renderArena();
            });
            
            onSnapshot(doc(db, F_RAID_DOC), (docSnap) => {
                if(docSnap.exists()) {
                    localState.raid = { id: docSnap.id, ...docSnap.data() };
                } else {
                    localState.raid = null;
                }
                hasLoaded.raid = true;
                if (hasLoaded.members && hasLoaded.raid) renderArena();
            });
        }

        function getMemberById(id) { 
            return localState.members.find(m => m.id === id); 
        }

        // === ARENA BATTLE LOGIC ===
        function renderArena() {
            const container = document.getElementById('view-arena');
            const raid = localState.raid;

            if (!raid || !raid.isActive) {
                 container.innerHTML = `
                    <div class="flex justify-between items-center mb-4 border-b-2 border-amber-300 pb-2">
                        <h1 class="text-4xl font-bold font-fantasy text-guild-leather-dark">Active Raid</h1>
                    </div>
                    <div class="flex flex-col items-center justify-center flex-grow bg-[#fefce8] border border-amber-200 rounded-lg shadow-md p-8 text-center">
                        <i data-lucide="shield-check" class="h-20 w-20 text-emerald-600 opacity-50 mb-4"></i>
                        <p class="text-2xl font-fantasy text-guild-leather-dark mb-2">The realm is secure.</p>
                        <p class="text-guild-leather/70">No raid bosses are currently attacking the guild. (Set one up in Guild Setup)</p>
                    </div>
                 `;
                 lucide.createIcons();
                 return;
            }

            const isDefeated = raid.hp <= 0;
            const bossPct = Math.max(0, (raid.hp / raid.maxHp) * 100);

            const sortedMembers = [...localState.members].sort((a, b) => (a.displayOrder || 0) - (b.displayOrder || 0));
            const memberOptions = `<option value="">-- Choose Adventurer --</option>` + sortedMembers.map(m => `<option value="${m.id}">${m.name}</option>`).join('');

            let tasksHtml = '';
            if (raid.tasks && raid.tasks.length > 0) {
                const sortedTasks = [...raid.tasks].sort((a,b) => (a.isComplete === b.isComplete) ? 0 : a.isComplete ? 1 : -1);
                
                tasksHtml = sortedTasks.map((task, idx) => {
                    let actionBtnHtml = '';
                    let actionIcon = '';
                    let actionColor = '';
                    let typeLabel = '';
                    
                    if (task.type === 'strike') { actionIcon = 'sword'; actionColor = 'bg-red-700 hover:bg-red-800 border-red-950'; typeLabel = 'STRIKE'; }
                    else if (task.type === 'spell') { actionIcon = 'wand-2'; actionColor = 'bg-blue-700 hover:bg-blue-800 border-blue-950'; typeLabel = 'SPELL'; }
                    else if (task.type === 'heal') { actionIcon = 'heart'; actionColor = 'bg-emerald-600 hover:bg-emerald-700 border-emerald-900'; typeLabel = 'HEAL'; }
                    
                    if (task.isComplete) {
                        const hero = getMemberById(task.completedBy);
                        actionBtnHtml = `<div class="flex items-center gap-2 text-sm font-bold text-gray-500 bg-gray-100 px-4 py-2 rounded border border-gray-200">
                            <span class="w-6 h-6 rounded-full ${hero?hero.color:'bg-gray-400'} text-white flex items-center justify-center text-xs">${hero?hero.emoji||hero.name[0]:'?'}</span>
                            DONE
                        </div>`;
                    } else if (isDefeated) {
                         actionBtnHtml = `<div class="text-sm font-bold text-gray-400">BOSS DEFEATED</div>`;
                    } else {
                        actionBtnHtml = `<button class="raid-action-btn flex items-center gap-2 px-6 py-2.5 rounded shadow-sm transition-transform hover:scale-105 active:scale-95 text-white font-bold font-fantasy tracking-widest border-b-4 active:border-b-0 active:mt-1 ${actionColor}" data-task-idx="${idx}">
                            <i data-lucide="${actionIcon}" class="w-5 h-5"></i> ${typeLabel}
                        </button>`;
                    }

                    return `
                    <div class="flex items-center justify-between p-4 bg-white rounded-xl shadow-sm border border-amber-200 ${task.isComplete ? 'opacity-60 grayscale-[50%]' : ''}">
                        <div>
                            <p class="font-bold text-guild-leather-dark text-lg ${task.isComplete ? 'line-through' : ''}">${task.name}</p>
                            <p class="text-sm font-fantasy text-guild-gold font-bold mt-1">
                                ${task.type === 'heal' ? 'Rewards:' : 'Deals:'} ${task.damage} ${task.type === 'heal' ? '💎' : 'DMG'}
                            </p>
                        </div>
                        <div>${actionBtnHtml}</div>
                    </div>`;
                }).join('');
            } else {
                tasksHtml = `<p class="text-center text-guild-leather/50 italic py-8">No objectives assigned to this raid yet.</p>`;
            }

            container.innerHTML = `
                 <div class="flex justify-between items-end mb-4 border-b-2 border-amber-300 pb-2">
                     <h1 class="text-4xl font-bold font-fantasy text-guild-leather-dark">Active Raid</h1>
                     <div class="flex items-center gap-3">
                         <label class="font-bold text-guild-leather-dark text-sm uppercase tracking-wider">Acting Hero:</label>
                         <select id="raid-hero-select" class="p-2 border-2 border-amber-400 rounded-lg bg-white font-bold text-guild-leather-dark shadow-sm focus:ring-2 focus:ring-guild-gold outline-none w-48">
                             ${memberOptions}
                         </select>
                     </div>
                 </div>
                 
                 <div class="flex-grow flex flex-col bg-[#fefce8] border border-amber-200 rounded-lg shadow-lg overflow-hidden relative">
                    
                    <div class="relative flex-shrink-0 flex flex-col justify-center items-center p-8 min-h-[300px] border-b-4 border-guild-leather-dark overflow-hidden">
                        <div class="absolute inset-0 bg-gradient-to-b from-slate-900 to-slate-700 transition-opacity duration-1000 ${isDefeated ? 'opacity-0' : 'opacity-100'}"></div>
                        <div class="absolute inset-0 bg-gradient-to-b from-blue-200 to-emerald-100 transition-opacity duration-1000 ${isDefeated ? 'opacity-100' : 'opacity-0'}"></div>
                        
                        <div class="text-center z-10 w-full max-w-md relative">
                            ${isDefeated ? `
                                <div class="absolute inset-0 flex items-center justify-center animate-pop-in z-20">
                                    <h2 class="text-6xl font-black font-fantasy text-amber-400 drop-shadow-[0_5px_5px_rgba(0,0,0,0.8)] transform -rotate-12">VICTORY!</h2>
                                </div>
                            ` : ''}
                            <div id="raid-boss-sprite" class="text-8xl md:text-9xl mb-6 transition-all duration-500 ease-in-out ${isDefeated ? 'opacity-50 grayscale scale-90 translate-y-10 blur-sm' : 'animate-hop-and-wiggle hover:scale-110 drop-shadow-[0_15px_15px_rgba(0,0,0,0.6)] cursor-pointer'}" onclick="!${isDefeated} && playSound('bossHit')">
                                ${raid.emoji}
                            </div>
                            
                            <div class="w-full bg-gray-950 h-8 rounded-full overflow-hidden border-[3px] border-slate-800 shadow-[inset_0_4px_6px_rgba(0,0,0,0.6)] relative z-10">
                                <div id="boss-hp-bar" class="bg-gradient-to-b from-red-500 to-red-700 h-full transition-all duration-500 ease-out flex justify-end items-center pr-2" style="width: ${bossPct}%">
                                    <div class="w-1 h-full bg-white/30 blur-[1px]"></div>
                                </div>
                                <div class="absolute inset-0 flex items-center justify-center font-mono font-bold text-white text-sm drop-shadow-md mix-blend-difference">
                                    ${raid.hp} / ${raid.maxHp} HP
                                </div>
                            </div>
                            <p id="boss-name" class="font-fantasy text-amber-100 mt-4 font-black text-3xl tracking-widest uppercase drop-shadow-md z-10 relative ${isDefeated ? 'text-guild-leather-dark' : ''}">${raid.name}</p>
                        </div>
                    </div>

                    <div class="flex-grow bg-[#f5ebd9] p-6 overflow-y-auto">
                        <h3 class="text-2xl font-bold font-fantasy text-guild-leather-dark mb-4 border-b border-amber-300/50 pb-2">Raid Objectives</h3>
                        <div class="space-y-4 max-w-4xl mx-auto">
                            ${tasksHtml}
                        </div>
                    </div>
                 </div>
            `;

            lucide.createIcons();
            
            document.querySelectorAll('.raid-action-btn').forEach(btn => {
                btn.addEventListener('click', handleExecuteRaidTask);
            });
        }

        async function handleExecuteRaidTask(e) {
            const btn = e.currentTarget;
            const taskIdx = btn.dataset.taskIdx;
            const heroSelect = document.getElementById('raid-hero-select');
            const heroId = heroSelect.value;

            if (!heroId) {
                heroSelect.classList.remove('animate-damage-shake');
                void heroSelect.offsetWidth;
                heroSelect.classList.add('animate-damage-shake');
                heroSelect.style.borderColor = 'red';
                setTimeout(() => heroSelect.style.borderColor = '', 500);
                playSound('uncomplete');
                return;
            }

            const hero = getMemberById(heroId);
            const raid = localState.raid;
            const task = raid.tasks[taskIdx];

            if(!hero || !raid || !task || task.isComplete || raid.hp <= 0) return;

            const damage = task.type === 'heal' ? 0 : task.damage;
            const newHp = Math.max(0, raid.hp - damage);
            const lootEarned = task.damage; 
            
            const updatedTasks = [...raid.tasks];
            updatedTasks[taskIdx] = {
                ...task,
                isComplete: true,
                completedBy: hero.id
            };

            const bossEl = document.getElementById('raid-boss-sprite');
            if (task.type === 'strike') {
                playSound('hit');
                if(bossEl) {
                    bossEl.classList.remove('animate-damage-shake');
                    void bossEl.offsetWidth; 
                    bossEl.classList.add('animate-damage-shake');
                }
            } else if (task.type === 'spell') {
                playSound('spell');
                if(bossEl) {
                    bossEl.classList.remove('animate-magic-flash');
                    void bossEl.offsetWidth; 
                    bossEl.classList.add('animate-magic-flash');
                    setTimeout(() => {
                        bossEl.classList.remove('animate-damage-shake');
                        void bossEl.offsetWidth; 
                        bossEl.classList.add('animate-damage-shake');
                    }, 200);
                }
            } else if (task.type === 'heal') {
                playSound('heal');
            }

            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader" class="w-5 h-5 animate-spin"></i> CASTING...`;
            lucide.createIcons({root: btn});

            try {
                const batch = writeBatch(db);
                
                const raidRef = doc(db, `/artifacts/${appId}/public/data/raids/current`);
                batch.update(raidRef, {
                    hp: newHp,
                    tasks: updatedTasks
                });

                const memberRef = doc(db, `/artifacts/${appId}/public/data/members/${hero.id}`);
                batch.update(memberRef, {
                    points: (hero.points || 0) + lootEarned
                });

                const historyRef = doc(collection(db, `/artifacts/${appId}/public/data/choreHistory`));
                let actionText = task.type === 'strike' ? 'struck' : (task.type === 'spell' ? 'cast a spell on' : 'supported the raid via');
                
                batch.set(historyRef, {
                    type: 'chore_complete',
                    choreName: `[RAID] ${task.name} - ${actionText} boss`,
                    choreEmoji: raid.emoji, 
                    memberId: hero.id, 
                    memberName: hero.name, 
                    pointsEarned: lootEarned,
                    timestamp: serverTimestamp()
                });

                await batch.commit();
                
                if (newHp === 0 && raid.hp > 0) {
                    setTimeout(() => {
                        playSound('redeem'); 
                        triggerConfetti();
                    }, 500);
                }

            } catch (error) {
                console.error("Failed to execute raid task:", error);
                playSound('uncomplete');
                btn.disabled = false;
                btn.innerHTML = "FAILED";
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            try { 
                initFirebase(); 
                initConfetti(); 
                lucide.createIcons(); 
                document.body.addEventListener('click', initSounds, { once: true });
             } catch (error) { 
                 console.error("Critical Error during app initialization:", error);
                 document.getElementById('loading-text').textContent = 'Initialization Error.';
             }
        });
    </script>
</body>
</html>
